version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - todo-network

  backend:
    build:
      context: ./backend
    image: todo-backend:1.0
    container_name: todo-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      MONGO_URI: "mongodb://mongodb:27017/todo-app"
      JWT_SECRET: "mySuperSecretKey123ChangeThisLater"
      JWT_EXPIRES_IN: "7d"
      NODE_ENV: "development"
      PORT: "3000"
    ports:
      - "3000:3000"
    networks:
      - todo-network

  frontend:
    build:
      context: ./frontend
    image: todo-frontend:1.0
    container_name: todo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - todo-network

networks:
  todo-network:
    name: todo-network

volumes:
  mongodb_data:
    name: mongodb_data
    external: true
